<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Sacred Geometry Studio is a browser-based creative tool for procedural geometric artwork."
    />
    <title>Sacred Geometry Studio</title>
  </head>
  <body>
    <div id="app" class="studio-shell">
      <header class="topbar">
        <div class="brand-lockup">
          <span class="brand-mark" aria-hidden="true"></span>
          <div>
            <h1>Sacred Geometry Studio</h1>
            <p>Procedural SVG artwork generator</p>
          </div>
        </div>

        <div class="topbar-actions">
          <label class="seed-control" for="seedInput">
            <span>Seed</span>
            <input id="seedInput" type="text" spellcheck="false" autocomplete="off" />
          </label>
          <button id="applySeedButton" class="button button-ghost" type="button">Regenerate</button>
          <button id="randomizeButton" class="button button-primary" type="button">Random Design</button>
          <button id="resetButton" class="button button-ghost" type="button">Reset</button>
          <button id="exportSvgButton" class="button button-ghost" type="button">SVG</button>
          <button id="exportPngButton" class="button button-ghost" type="button">PNG</button>
        </div>
      </header>

      <main class="workspace">
        <section class="preview-column" aria-label="Artwork preview">
          <div class="preview-header">
            <div>
              <span class="eyebrow">Live Preview</span>
              <h2 id="previewTitle">Ancient Gold</h2>
            </div>
            <div class="preview-meta">
              <span id="previewAspect">Square 1:1</span>
              <span id="previewPattern">Flower of Life</span>
            </div>
          </div>

          <div class="gallery-stage">
            <div id="artworkFrame" class="artwork-frame">
              <div id="artworkMount" class="artwork-mount"></div>
            </div>
          </div>

          <aside class="info-panel">
            <span class="eyebrow">Geometry</span>
            <p id="patternDescription"></p>
          </aside>
        </section>

        <aside class="control-panel" aria-label="Artwork controls">
          <section class="panel-section">
            <div class="section-heading">
              <span class="eyebrow">Mood Presets</span>
              <h2>Visual System</h2>
            </div>
            <div id="moodPresetGrid" class="preset-grid"></div>
          </section>

          <section class="panel-section" data-collapsible data-section-id="geometry-layer">
            <div class="section-heading section-heading-collapsible">
              <span class="eyebrow">Pattern</span>
              <h2>
                <button
                  class="section-toggle"
                  type="button"
                  data-collapse-toggle
                  aria-expanded="true"
                  aria-controls="geometryLayerControls"
                >
                  <span>Geometry Layer</span>
                  <span class="collapse-icon" aria-hidden="true"></span>
                </button>
              </h2>
            </div>
            <div id="geometryLayerControls" class="control-grid" data-collapse-content>
              <label class="field field-full" for="patternSelect">
                <span>Pattern Type</span>
                <select id="patternSelect" data-bind="pattern"></select>
              </label>

              <label class="field" for="complexityInput">
                <span>Rings / Complexity <output id="complexityValue"></output></span>
                <input id="complexityInput" data-bind="complexity" type="range" min="1" max="7" step="1" />
              </label>

              <label class="field" for="scaleInput">
                <span>Radius / Scale <output id="scaleValue"></output></span>
                <input id="scaleInput" data-bind="scale" type="range" min="55" max="112" step="1" />
              </label>

              <label class="field" for="rotationInput">
                <span>Rotation <output id="rotationValue"></output></span>
                <input id="rotationInput" data-bind="rotation" type="range" min="0" max="359" step="1" />
              </label>

              <label class="field" for="symmetryInput">
                <span>Symmetry <output id="symmetryValue"></output></span>
                <input id="symmetryInput" data-bind="symmetry" type="range" min="5" max="24" step="1" />
              </label>

              <div class="control-subheading field-full">
                <span class="eyebrow">Ink</span>
                <h3>Stroke & Light</h3>
              </div>

              <label class="field color-field" for="strokeColorInput">
                <span>Stroke Color</span>
                <input id="strokeColorInput" data-bind="strokeColor" type="color" />
              </label>

              <label class="field color-field" for="secondaryColorInput">
                <span>Secondary Color</span>
                <input id="secondaryColorInput" data-bind="secondaryColor" type="color" />
              </label>

              <label class="field" for="strokeWidthInput">
                <span>Stroke Width <output id="strokeWidthValue"></output></span>
                <input id="strokeWidthInput" data-bind="strokeWidth" type="range" min="0.8" max="8" step="0.1" />
              </label>

              <label class="field" for="strokeOpacityInput">
                <span>Stroke Opacity <output id="strokeOpacityValue"></output></span>
                <input id="strokeOpacityInput" data-bind="strokeOpacity" type="range" min="0.2" max="1" step="0.01" />
              </label>

              <label class="field" for="fillOpacityInput">
                <span>Fill Opacity <output id="fillOpacityValue"></output></span>
                <input id="fillOpacityInput" data-bind="fillOpacity" type="range" min="0" max="0.45" step="0.01" />
              </label>

              <label class="field" for="glowStrengthInput">
                <span>Glow Strength <output id="glowStrengthValue"></output></span>
                <input id="glowStrengthInput" data-bind="glowStrength" type="range" min="0" max="14" step="0.5" />
              </label>

              <label class="toggle-field" for="fillEnabledInput">
                <input id="fillEnabledInput" data-bind="fillEnabled" type="checkbox" />
                <span>Fill</span>
              </label>

              <label class="toggle-field" for="centerEmphasisInput">
                <input id="centerEmphasisInput" data-bind="centerEmphasis" type="checkbox" />
                <span>Center Emphasis</span>
              </label>
            </div>
          </section>

          <section class="panel-section" data-collapsible data-section-id="overlay-system" data-default-collapsed="true">
            <div class="section-heading section-heading-collapsible">
              <span class="eyebrow">Layers</span>
              <h2>
                <button
                  class="section-toggle"
                  type="button"
                  data-collapse-toggle
                  aria-expanded="false"
                  aria-controls="overlaySystemControls"
                >
                  <span>Overlay System</span>
                  <span class="collapse-icon" aria-hidden="true"></span>
                </button>
              </h2>
            </div>
            <div id="overlaySystemControls" class="control-grid" data-collapse-content>
              <label class="toggle-field field-full" for="overlayEnabledInput">
                <input id="overlayEnabledInput" data-bind="overlayEnabled" type="checkbox" />
                <span>Secondary Overlay</span>
              </label>

              <label class="field field-full" for="overlayPatternSelect">
                <span>Overlay Pattern</span>
                <select id="overlayPatternSelect" data-bind="overlayPattern"></select>
              </label>

              <label class="field" for="overlayOpacityInput">
                <span>Overlay Opacity <output id="overlayOpacityValue"></output></span>
                <input id="overlayOpacityInput" data-bind="overlayOpacity" type="range" min="0.08" max="0.7" step="0.01" />
              </label>

              <label class="field" for="overlayScaleInput">
                <span>Overlay Size <output id="overlayScaleValue"></output></span>
                <input id="overlayScaleInput" data-bind="overlayScale" type="range" min="25" max="180" step="1" />
              </label>

              <label class="field" for="overlayComplexityInput">
                <span>Overlay Complexity <output id="overlayComplexityValue"></output></span>
                <input id="overlayComplexityInput" data-bind="overlayComplexity" type="range" min="1" max="7" step="1" />
              </label>

              <label class="field" for="overlaySymmetryInput">
                <span>Overlay Symmetry <output id="overlaySymmetryValue"></output></span>
                <input id="overlaySymmetryInput" data-bind="overlaySymmetry" type="range" min="5" max="24" step="1" />
              </label>

              <label class="field" for="overlayRotationInput">
                <span>Overlay Rotation <output id="overlayRotationValue"></output></span>
                <input id="overlayRotationInput" data-bind="overlayRotation" type="range" min="0" max="359" step="1" />
              </label>

              <label class="toggle-field field-full" for="centerSymbolEnabledInput">
                <input id="centerSymbolEnabledInput" data-bind="centerSymbolEnabled" type="checkbox" />
                <span>Center Symbol Layer</span>
              </label>
            </div>
          </section>

          <section class="panel-section" data-collapsible data-section-id="artwork-background" data-default-collapsed="true">
            <div class="section-heading section-heading-collapsible">
              <span class="eyebrow">Ground</span>
              <h2>
                <button
                  class="section-toggle"
                  type="button"
                  data-collapse-toggle
                  aria-expanded="false"
                  aria-controls="artworkBackgroundControls"
                >
                  <span>Artwork Background</span>
                  <span class="collapse-icon" aria-hidden="true"></span>
                </button>
              </h2>
            </div>
            <div id="artworkBackgroundControls" class="control-grid" data-collapse-content>
              <label class="field field-full" for="backgroundPresetSelect">
                <span>Background Preset</span>
                <select id="backgroundPresetSelect" data-bind="backgroundPreset"></select>
              </label>

              <label class="field color-field" for="backgroundColor1Input">
                <span>Color 1</span>
                <input id="backgroundColor1Input" data-bind="backgroundColor1" type="color" />
              </label>

              <label class="field color-field" for="backgroundColor2Input">
                <span>Color 2</span>
                <input id="backgroundColor2Input" data-bind="backgroundColor2" type="color" />
              </label>

              <label class="toggle-field" for="vignetteInput">
                <input id="vignetteInput" data-bind="vignette" type="checkbox" />
                <span>Vignette</span>
              </label>

              <label class="toggle-field" for="grainInput">
                <input id="grainInput" data-bind="grain" type="checkbox" />
                <span>Subtle Grain</span>
              </label>
            </div>
          </section>

          <section class="panel-section" data-collapsible data-section-id="animation" data-default-collapsed="true">
            <div class="section-heading section-heading-collapsible">
              <span class="eyebrow">Motion</span>
              <h2>
                <button
                  class="section-toggle"
                  type="button"
                  data-collapse-toggle
                  aria-expanded="false"
                  aria-controls="animationControls"
                >
                  <span>Animation</span>
                  <span class="collapse-icon" aria-hidden="true"></span>
                </button>
              </h2>
            </div>
            <div id="animationControls" class="control-grid" data-collapse-content>
              <label class="toggle-field field-full" for="animationPreviewEnabledInput">
                <input id="animationPreviewEnabledInput" data-bind="animationPreviewEnabled" type="checkbox" />
                <span>Animated Preview</span>
              </label>

              <label class="field field-full" for="animationPresetSelect">
                <span>Motion Preset</span>
                <select id="animationPresetSelect" data-bind="animationPreset"></select>
              </label>

              <label class="field" for="animationDurationInput">
                <span>Duration <output id="animationDurationValue"></output></span>
                <input id="animationDurationInput" data-bind="animationDuration" type="range" min="2" max="20" step="1" />
              </label>

              <label class="field" for="animationFpsInput">
                <span>Video FPS <output id="animationFpsValue"></output></span>
                <input id="animationFpsInput" data-bind="animationFps" type="range" min="12" max="60" step="6" />
              </label>

              <label class="field" for="animationStrengthInput">
                <span>Motion Depth <output id="animationStrengthValue"></output></span>
                <input id="animationStrengthInput" data-bind="animationStrength" type="range" min="0" max="100" step="1" />
              </label>

              <label class="field" for="gifSizeInput">
                <span>GIF Size <output id="gifSizeValue"></output></span>
                <input id="gifSizeInput" data-bind="gifSize" type="number" min="320" max="2048" step="16" inputmode="numeric" />
              </label>

              <label class="field" for="gifFpsInput">
                <span>GIF FPS <output id="gifFpsValue"></output></span>
                <input id="gifFpsInput" data-bind="gifFps" type="number" min="2" max="24" step="1" inputmode="numeric" />
              </label>

              <div class="video-export-row field-full">
                <button id="exportGifButton" class="button button-primary" type="button">GIF</button>
                <button id="exportWebmButton" class="button button-ghost" type="button">WebM</button>
                <button id="exportMp4Button" class="button button-ghost" type="button">MP4</button>
                <span id="videoExportStatus" class="export-status" aria-live="polite"></span>
              </div>
            </div>
          </section>

          <section class="panel-section">
            <div class="section-heading">
              <span class="eyebrow">Export</span>
              <h2>Output</h2>
            </div>
            <div class="control-grid">
              <label class="field" for="aspectRatioSelect">
                <span>Aspect Ratio</span>
                <select id="aspectRatioSelect" data-bind="aspectRatio"></select>
              </label>

              <label class="field" for="exportSizeSelect">
                <span>PNG Size</span>
                <select id="exportSizeSelect" data-bind="exportSize">
                  <option value="1024">1024 px</option>
                  <option value="2048">2048 px</option>
                  <option value="4096">4096 px</option>
                </select>
              </label>
            </div>
          </section>

          <section class="panel-section">
            <div class="section-heading">
              <span class="eyebrow">Local Presets</span>
              <h2>Saved Designs</h2>
            </div>
            <div class="save-row">
              <input id="presetNameInput" type="text" maxlength="48" placeholder="Preset name" />
              <button id="savePresetButton" class="button button-primary" type="button">Save</button>
            </div>
            <div class="save-row">
              <select id="savedPresetSelect"></select>
              <button id="loadPresetButton" class="button button-ghost" type="button">Load</button>
              <button id="deletePresetButton" class="button button-danger" type="button">Delete</button>
            </div>
          </section>
        </aside>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
